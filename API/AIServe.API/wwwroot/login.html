<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI预约服务系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #6c757d;
            font-size: 14px;
        }
        .form-tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #eee;
        }
        .form-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #6c757d;
            position: relative;
            transition: all 0.3s;
        }
        .form-tab:hover {
            color: #667eea;
        }
        .form-tab.active {
            color: #667eea;
            font-weight: 600;
        }
        .form-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
        }
        .hint-text {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #6c757d;
            font-size: 13px;
        }
        .hint-text code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>AI预约服务系统</h1>
                <p>欢迎登录</p>
            </div>

            <div class="form-tabs">
                <button class="form-tab active" data-form="login">登录</button>
                <button class="form-tab" data-form="register">注册</button>
            </div>

            <form id="login-form" class="form-content active">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">登录</button>
            </form>

            <form id="register-form" class="form-content">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="register-confirm" placeholder="请再次输入密码" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">注册</button>
            </form>

            <div class="hint-text">
                默认账号: <code>admin</code> / <code>admin123</code>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/login.js"></script>
</body>
</html>
